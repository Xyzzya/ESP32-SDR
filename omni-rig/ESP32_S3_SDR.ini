;-------------------------------------------------------------------------------
;                ESP32-S3 SDR Receiver — Omni-Rig CAT command file
;
;  Usage:
;    1. Copy this file to: %APPDATA%\Afreet\Rigs\
;    2. Start Omni-Rig
;    3. Select RIG1, Rig-Type: "ESP32-S3 SDR", COM port, 115200 baud
;    4. In HDSDR Options → CAT to Omni-Rig, select RIG1
;
;  Hardware: ESP32-S3 + Si5351 quad LO + PCM1808 ADC
;  Protocol: Serial CDC @ 115200 baud, 8N1
;  Commands: FREQ,<Hz>  |  VER  |  ?
;
;  See: http://www.dxatlas.com/OmniRig/IniStru.txt for INI reference
;-------------------------------------------------------------------------------

[INIT]
; Nothing needed — device is ready on boot

[pmFreqA]
; Set VFO-A frequency in Hz
; Sends: FREQ,<freq_hz>\r\n  (e.g. FREQ,14100000)
Command=(FREQ,.........)
Value=5|9|vfText|1|0

[pmFreqB]
; Same as VFO-A (single-LO receiver, no VFO-B)
Command=(FREQ,.........)
Value=5|9|vfText|1|0

[pmFreq]
; Readback not directly supported via Omni-Rig.
; The device reports "FREQ:<Hz>" on CDC when ? is sent,
; but Omni-Rig does not parse this format natively.
;
; To query manually, send "?" and read the response.
