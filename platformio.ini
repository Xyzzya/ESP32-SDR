; PlatformIO Project Configuration File
; ESP32-S3 SDR Receiver
; Si5351 quadrature LO + PCM1808 I2S ADC + USB Audio Class (UAC2) + CDC Serial

[env:esp32-s3-devkitc-1]
platform = espressif32
board = esp32-s3-devkitc-1
framework = espidf

; --- Build flags ---
build_flags =
    -DCFG_TUSB_MCU=OPT_MCU_ESP32S3
    -DCFG_TUD_AUDIO=1

; --- Pre-build guard: abort if WiFi is enabled in sdkconfig ---
extra_scripts = pre:check_wifi.py

; --- Upload ---
upload_speed = 921600
monitor_speed = 115200
